steps:

# 1️⃣ Authenticate kubectl with GKE
- name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
  id: 'auth-cluster'
  entrypoint: gcloud
  args:
    - container
    - clusters
    - get-credentials
    - console-cluster
    - --region=asia-southeast1
    - --project=$PROJECT_ID

# 2️⃣ Create / update Kubernetes secret
- name: 'gcr.io/cloud-builders/kubectl'
  id: 'update-secret'
  entrypoint: bash
  args:
    - -c
    - |
      kubectl create secret generic backend-secret \
        --from-literal=DATABASE_URL="$_DATABASE_URL" \
        --from-literal=JWT_SECRET="$_JWT_SECRET" \
        --from-literal=JWT_REFRESH_SECRET="$_JWT_REFRESH_SECRET" \
        --from-literal=OMISE_SECRET_KEY="$_OMISE_SECRET_KEY" \
        --from-literal=OMISE_PUBLIC_KEY="$_OMISE_PUBLIC_KEY" \
        --from-literal=OMISE_WEBHOOK_SECRET="$_OMISE_WEBHOOK_SECRET" \
        --dry-run=client -o yaml | kubectl apply -f -

# 3️⃣ Build image
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'build',
      '-t',
      'asia-southeast1-docker.pkg.dev/$PROJECT_ID/console-shop/backend:$SHORT_SHA',
      '.'
    ]

# 4️⃣ Push image
- name: 'gcr.io/cloud-builders/docker'
  args:
    [
      'push',
      'asia-southeast1-docker.pkg.dev/$PROJECT_ID/console-shop/backend:$SHORT_SHA'
    ]

# 5️⃣ Deploy new image
- name: 'gcr.io/cloud-builders/kubectl'
  args:
    [
      'set',
      'image',
      'deployment/console-backend',
      'console-backend=asia-southeast1-docker.pkg.dev/$PROJECT_ID/console-shop/backend:$SHORT_SHA'
    ]

images:
- 'asia-southeast1-docker.pkg.dev/$PROJECT_ID/console-shop/backend:$SHORT_SHA'

options:
  logging: CLOUD_LOGGING_ONLY